syntax = "proto3";
package natchain.wallet.v1;

import "cosmos/msg/v1/msg.proto";

option go_package = "natchain/x/wallet/types";

service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc SetSafetyLimit(MsgSetSafetyLimit) returns (MsgSetSafetyLimitResponse);
  rpc SetColdAddress(MsgSetColdAddress) returns (MsgSetColdAddressResponse);
  rpc SetAutoTransfer(MsgSetAutoTransfer) returns (MsgSetAutoTransferResponse);
  rpc AddPartner(MsgAddPartner) returns (MsgAddPartnerResponse);
  rpc RemovePartner(MsgRemovePartner) returns (MsgRemovePartnerResponse);
  rpc UpdatePartner(MsgUpdatePartner) returns (MsgUpdatePartnerResponse);
}

message MsgSetSafetyLimit {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  int64 safety_limit = 2;
}

message MsgSetSafetyLimitResponse {}

message MsgSetColdAddress {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string cold_address = 2;
}

message MsgSetColdAddressResponse {}

message MsgSetAutoTransfer {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  int64 threshold = 2;
  string amount = 3;
  bool enabled = 4;
}

message MsgSetAutoTransferResponse {}

message MsgAddPartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string name = 2;
  string address = 3;
  string memo = 4;
}

message MsgAddPartnerResponse {}

message MsgRemovePartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string address = 2;
}

message MsgRemovePartnerResponse {}

message MsgUpdatePartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string address = 2;
  string name = 3;
  string memo = 4;
}

message MsgUpdatePartnerResponse {}
