syntax = "proto3";
package natchain.wallet.v1;

import "gogoproto/gogo.proto";
import "natchain/wallet/v1/params.proto";
import "natchain/wallet/v1/wallet.proto";

option go_package = "natchain/x/wallet/types";

// GenesisState 创世状态
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated Wallet wallets = 2 [(gogoproto.nullable) = false];
  repeated TransferRecord transfer_records = 3 [(gogoproto.nullable) = false];
  uint64 next_transfer_id = 4;
}
