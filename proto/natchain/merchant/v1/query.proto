syntax = "proto3";
package natchain.merchant.v1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "natchain/merchant/v1/params.proto";
import "natchain/merchant/v1/merchant.proto";

option go_package = "natchain/x/merchant/types";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/natchain/merchant/v1/params";
  }
  
  rpc Merchant(QueryMerchantRequest) returns (QueryMerchantResponse) {
    option (google.api.http).get = "/natchain/merchant/v1/merchant/{address}";
  }
  
  rpc MerchantAll(QueryMerchantAllRequest) returns (QueryMerchantAllResponse) {
    option (google.api.http).get = "/natchain/merchant/v1/merchants";
  }
  
  rpc PaymentRecord(QueryPaymentRecordRequest) returns (QueryPaymentRecordResponse) {
    option (google.api.http).get = "/natchain/merchant/v1/payment/{id}";
  }
  
  rpc PaymentRecordsByMerchant(QueryPaymentRecordsByMerchantRequest) returns (QueryPaymentRecordsByMerchantResponse) {
    option (google.api.http).get = "/natchain/merchant/v1/payments/{merchant_address}";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryMerchantRequest {
  string address = 1;
}

message QueryMerchantResponse {
  Merchant merchant = 1 [(gogoproto.nullable) = false];
}

message QueryMerchantAllRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryMerchantAllResponse {
  repeated Merchant merchants = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryPaymentRecordRequest {
  string id = 1;
}

message QueryPaymentRecordResponse {
  PaymentRecord payment_record = 1 [(gogoproto.nullable) = false];
}

message QueryPaymentRecordsByMerchantRequest {
  string merchant_address = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryPaymentRecordsByMerchantResponse {
  repeated PaymentRecord payment_records = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
